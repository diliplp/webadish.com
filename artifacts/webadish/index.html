<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title><!--app-title--></title>
    <!--app-head-->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G5KV9ZHEXG', { send_page_view: false });
      window.clarity = window.clarity || function () {
        (window.clarity.q = window.clarity.q || []).push(arguments);
      };

      function loadDeferredScript(src, attributes) {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;

        if (attributes) {
          Object.entries(attributes).forEach(([key, value]) => {
            script.setAttribute(key, value);
          });
        }

        document.head.appendChild(script);
      }

      function scheduleDeferredThirdParties() {
        const loadAll = function () {
          loadDeferredScript('https://www.googletagmanager.com/gtag/js?id=G-G5KV9ZHEXG');
        };

        const loadClarity = function () {
          loadDeferredScript('https://www.clarity.ms/tag/vzlgprw0bu');
        };

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadAll, { timeout: 3000 });
          window.setTimeout(loadClarity, 6000);
        } else {
          window.setTimeout(loadAll, 2000);
          window.setTimeout(loadClarity, 6000);
        }
      }

      window.addEventListener('load', scheduleDeferredThirdParties, { once: true });
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Alata&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Alata&display=swap" rel="stylesheet">
