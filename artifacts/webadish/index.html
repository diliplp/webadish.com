<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title><!--app-title--></title>
    <!--app-head-->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G5KV9ZHEXG', { send_page_view: false });
      gtag('config', 'AW-17995549251');
      window.clarity = window.clarity || function () {
        (window.clarity.q = window.clarity.q || []).push(arguments);
      };

      function loadDeferredScript(src, attributes) {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;

        if (attributes) {
          Object.entries(attributes).forEach(([key, value]) => {
            script.setAttribute(key, value);
          });
        }

        document.head.appendChild(script);
      }

      function scheduleDeferredThirdParties() {
        const loadAll = function () {
          loadDeferredScript('https://www.googletagmanager.com/gtag/js?id=G-G5KV9ZHEXG');
        };

        const loadClarity = function () {
          loadDeferredScript('https://www.clarity.ms/tag/vzlgprw0bu');
        };

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadAll, { timeout: 3000 });
          window.setTimeout(loadClarity, 6000);
        } else {
          window.setTimeout(loadAll, 2000);
          window.setTimeout(loadClarity, 6000);
        }
      }

      window.addEventListener('load', scheduleDeferredThirdParties, { once: true });
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Alata&display=optional" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alata&display=optional"></noscript>
  </head>
  <body>
    <div id="contact-feedback-fallback" hidden></div>
    <script>
      window.__waContactFeedback = window.__waContactFeedback || null;

      (function () {
        var params = new URLSearchParams(window.location.search);
        var status = params.get('contact_status');

        if (status !== 'success' && status !== 'error') {
          return;
        }

        var ref = params.get('contact_ref') || '';
        var msg = params.get('contact_msg') || (
          status === 'success'
            ? 'Thank you! We have received your message and will get back to you shortly.'
            : 'We could not submit your request just now. Please try again or contact us directly.'
        );

        window.__waContactFeedback = { status: status, ref: ref, msg: msg };

        var shell = document.getElementById('contact-feedback-fallback');
        if (shell) {
          var background = status === 'success' ? '#ecfdf3' : '#fef2f2';
          var border = status === 'success' ? '#86efac' : '#fca5a5';
          var title = status === 'success' ? 'Request Submitted' : 'Submission Error';

          shell.innerHTML = ''
            + '<div style="margin:0 0 20px;padding:18px 20px;background:' + background + ';border:1px solid ' + border + ';border-radius:20px;box-shadow:0 12px 30px rgba(15,23,42,.08)">'
            +   '<div style="display:flex;gap:16px;align-items:flex-start;justify-content:space-between">'
            +     '<div>'
            +       '<p style="margin:0 0 4px;font:600 16px/1.4 Alata,system-ui,sans-serif;color:#111827">' + title + '</p>'
            +       '<p style="margin:0;font:400 14px/1.6 Alata,system-ui,sans-serif;color:#374151">' + msg + '</p>'
            +       (ref ? '<p style="margin:6px 0 0;font:400 12px/1.5 Alata,system-ui,sans-serif;color:#6b7280">Reference: ' + ref + '</p>' : '')
            +     '</div>'
            +     '<button type="button" id="contact-feedback-dismiss" aria-label="Dismiss message" style="border:0;background:transparent;color:#6b7280;font-size:18px;line-height:1;cursor:pointer;padding:2px 4px">×</button>'
            +   '</div>'
            + '</div>';

          var placeShell = function () {
            var targetId = window.location.hash ? window.location.hash.slice(1) : '';
            var target = (targetId && document.getElementById(targetId)) || document.getElementById('global_contact-form');

            if (target && target.parentNode) {
              target.parentNode.insertBefore(shell, target);
            } else {
              document.body.insertBefore(shell, document.getElementById('root'));
            }

            shell.hidden = false;

            var dismissButton = document.getElementById('contact-feedback-dismiss');
            if (dismissButton) {
              dismissButton.addEventListener('click', function () {
                shell.hidden = true;
              }, { once: true });
            }
          };

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', placeShell, { once: true });
          } else {
            placeShell();
          }
        }

        params.delete('contact_status');
        params.delete('contact_ref');
        params.delete('contact_msg');

        var nextQuery = params.toString();
        var nextUrl = window.location.pathname + (nextQuery ? '?' + nextQuery : '') + window.location.hash;
        window.history.replaceState({}, '', nextUrl);
      })();
    </script>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
