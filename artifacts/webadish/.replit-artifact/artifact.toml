kind = "web"
previewPath = "/"
title = "WebAdish — WordPress Security & Maintenance"
version = "1.0.0"
id = "artifacts/webadish"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20116
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/webadish run dev"

[services.env]
PORT = "20116"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/webadish", "run", "build"]
publicDir = "artifacts/webadish/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
